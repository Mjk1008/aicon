<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#c8ff5f" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#050507" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="#050507"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="78" x2="1200" y2="78"/>
    <line x1="0" y1="156" x2="1200" y2="156"/>
    <line x1="0" y1="234" x2="1200" y2="234"/>
    <line x1="0" y1="312" x2="1200" y2="312"/>
    <line x1="0" y1="390" x2="1200" y2="390"/>
    <line x1="0" y1="468" x2="1200" y2="468"/>
    <line x1="0" y1="546" x2="1200" y2="546"/>
    <line x1="78" y1="0" x2="78" y2="630"/>
    <line x1="156" y1="0" x2="156" y2="630"/>
    <line x1="234" y1="0" x2="234" y2="630"/>
    <line x1="312" y1="0" x2="312" y2="630"/>
    <line x1="390" y1="0" x2="390" y2="630"/>
    <line x1="468" y1="0" x2="468" y2="630"/>
    <line x1="546" y1="0" x2="546" y2="630"/>
    <line x1="624" y1="0" x2="624" y2="630"/>
    <line x1="702" y1="0" x2="702" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="858" y1="0" x2="858" y2="630"/>
    <line x1="936" y1="0" x2="936" y2="630"/>
    <line x1="1014" y1="0" x2="1014" y2="630"/>
    <line x1="1092" y1="0" x2="1092" y2="630"/>
  </g>

  <!-- brand pixel ring, scaled up, sat on right -->
  <g transform="translate(770, 165) scale(4)">
    <g fill="#c8ff5f">
      <rect x="20" y="10" width="10" height="10"/>
      <rect x="34" y="10" width="10" height="10"/>
      <rect x="10" y="20" width="10" height="10"/>
      <rect x="44" y="20" width="10" height="10"/>
      <rect x="10" y="34" width="10" height="10"/>
      <rect x="44" y="34" width="10" height="10"/>
      <rect x="20" y="44" width="10" height="10"/>
      <rect x="34" y="44" width="10" height="10"/>
    </g>
    <rect x="27" y="27" width="10" height="10" fill="#ffffff"/>
  </g>

  <!-- kicker -->
  <text x="80" y="170" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#9a9aa6" letter-spacing="3">AICON · AI CONSULTING</text>

  <!-- headline -->
  <text x="80" y="290" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="500" fill="#f0ede4">10× your business</text>
  <text x="80" y="380" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="300" font-style="italic" fill="#c8ff5f">with AI.</text>

  <!-- subtitle -->
  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-size="26" fill="#9a9aa6">We spot problems before you do, then solve them with AI.</text>

  <!-- domain badge -->
  <rect x="80" y="540" width="200" height="44" rx="22" fill="#c8ff5f"/>
  <text x="180" y="569" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#050507">aicon.dev</text>
</svg>
